version: '3.8'
services:
  training:
    build:
      context: ..
      dockerfile: docker/Dockerfile.training
    volumes:
      - ../data:/app/data
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    depends_on:
      - training
