apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-api
  namespace: streaming-ml
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recommendation-api
  template:
    metadata:
      labels:
        app: recommendation-api
    spec:
      containers:
        - name: api
          image: streaming-personalization-platform-api:latest
          ports:
            - containerPort: 8000
